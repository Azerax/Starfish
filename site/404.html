<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · route not found — Project Starfish</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#04060f">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#04060f; --panel:#070a16; --panel2:#080b18; --line:rgba(120,140,180,.18);
    --ink:#eaf0fb; --dim:#cdd7ea; --muted:#9aa8c4; --green:#39e09b; --green2:#5cebb0; --red:#ff6b81; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:'Inter Tight',-apple-system,BlinkMacSystemFont,sans-serif;
    background-image:radial-gradient(900px 500px at 50% -10%, rgba(57,224,155,.08), transparent 70%);padding:24px}
  .mono{font-family:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace}
  .term{width:min(620px,96vw);background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .bar{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.02)}
  .dot{width:11px;height:11px;border-radius:50%}
  .dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}
  .bar .ttl{margin-left:8px;font-size:12px;color:var(--muted)}
  .body{padding:22px 22px 26px;font-size:14px;line-height:1.7}
  .line{white-space:pre-wrap}
  .pr{color:var(--green)}
  .cmd{color:var(--dim)}
  .err{color:var(--red)}
  .out{color:var(--muted)}
  .big{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:clamp(46px,11vw,84px);
    letter-spacing:.04em;margin:14px 0 6px;background:linear-gradient(120deg,var(--green),#7fe6ff);
    -webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
  h1{font-size:20px;font-weight:700;margin:6px 0 4px}
  p.sub{color:var(--muted);font-size:14px;margin-bottom:20px}
  .cta{display:flex;gap:11px;flex-wrap:wrap}
  a.btn{font-size:14px;font-weight:600;text-decoration:none;padding:11px 18px;border-radius:9px;transition:.15s}
  a.primary{background:var(--green);color:#04060f}
  a.primary:hover{background:var(--green2)}
  a.ghost{color:var(--dim);border:1px solid var(--line)}
  a.ghost:hover{border-color:rgba(57,224,155,.5);color:var(--ink)}
  .cursor{display:inline-block;width:9px;height:17px;background:var(--green);vertical-align:-3px;margin-left:2px;animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
  <main class="term" role="main">
    <div class="bar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="ttl mono">starfish · console</span>
    </div>
    <div class="body">
      <div class="line mono"><span class="pr">$</span> <span class="cmd">starfish route --resolve "<span id="path">this page</span>"</span></div>
      <div class="line mono"><span class="err">DENY</span> <span class="out">route not found · out_of_boundary</span></div>
      <div class="big mono">404</div>
      <h1>Off the star chart.</h1>
      <p class="sub">That heading leads nowhere governed. Deny-by-default, even for missing pages.</p>
      <div class="cta">
        <a class="btn primary" href="/">cd ~ · return home</a>
        <a class="btn ghost" target="_blank" rel="noopener noreferrer" href="https://github.com/Azerax/Starfish">View on GitHub</a>
      </div>
      <div class="line mono" style="margin-top:18px;color:var(--muted)"><span class="pr">$</span> <span class="cursor"></span></div>
    </div>
  </main>
  <script>
    // surface the attempted path in the prompt (no external calls)
    try { var p = location.pathname + location.search; if (p && p !== '/') document.getElementById('path').textContent = p; } catch (e) {}
  </script>
</body>
</html>
