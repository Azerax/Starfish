name: CI
on:
  push:
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Secret scan (supply chain)
        run: npm run scan:secrets
      - name: Typecheck (type layer)
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Conformance suite
        run: npm run test:conformance
      - name: Determinism suite
        run: npm run test:determinism
      - name: Dependency-direction lint
        run: npm run lint:deps
      - name: IP denylist scan (compliance)
        run: npm run scan:ip
      - name: SBOM + license check (compliance)
        run: npm run sbom
      - name: CLI bundle
        run: npm run build:cli
